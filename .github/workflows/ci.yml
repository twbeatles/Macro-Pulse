name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    if: "${{ github.event_name != 'push' || github.event.head_commit.message != 'chore: keep workflows active' }}"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Build runtime image
      run: |
        # Docker Hub pulls can flake on GitHub-hosted runners (IPv6/network blips).
        # Retry with exponential backoff before failing the job.
        max_attempts=5
        for attempt in $(seq 1 "$max_attempts"); do
          if docker build -t macro-pulse:ci .; then
            exit 0
          fi
          if [ "$attempt" -eq "$max_attempts" ]; then
            echo "Docker build failed after ${max_attempts} attempts"
            exit 1
          fi
          delay=$((attempt * 20))
          echo "Docker build attempt ${attempt}/${max_attempts} failed; retrying in ${delay}s..."
          sleep "$delay"
        done

    - name: Run unit tests in Docker
      run: |
        docker run --rm \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:ci \
          sh -lc "uv run --frozen python -m unittest discover tests 2>&1 | tee unit-test.log"

    - name: Upload CI artifacts
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: ci-logs
        path: unit-test.log
        if-no-files-found: ignore
